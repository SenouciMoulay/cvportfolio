services:
  traefik:
    image: traefik:v2.10
    container_name: traefik
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Docker socket to read container labels
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Persistent storage for SSL certificates
      - ./traefik/letsencrypt:/letsencrypt
    command:
      # Enable dashboard (comment out in production)
      - "--api.dashboard=true"
      # Docker provider
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"

      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"

      # Let's Encrypt configuration (optional, for HTTPS)
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.email=your-email@example.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"

    labels:
      # Traefik dashboard (comment out in production)
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=admin:$$apr1$$H6OfP4Ej$$IgfCF3zq0S9LhCDSfRNlD1" # Change this! Use htpasswd to generate
  nextjs-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nextjs-app
    labels:
      # Routing configuration
      - "traefik.enable=true"
      # HTTP routing
      - "traefik.http.routers.nextjs.rule=Host(`localhost`)"
      - "traefik.http.routers.nextjs.entrypoints=web"
      # HTTPS routing (optional, uncomment for production)
      - "traefik.http.routers.nextjs-secure.rule=Host(`kopenkin.tech`)"
      - "traefik.http.routers.nextjs-secure.entrypoints=websecure"
      - "traefik.http.routers.nextjs-secure.tls.certresolver=myresolver"

      # Port exposure
      - "traefik.http.services.nextjs.loadbalancer.server.port=3000"

    # Ensure the container restarts
    restart: unless-stopped

    # Optional: environment variables
    environment:
      - NODE_ENV=production
      # Add any other environment-specific configurations

networks:
  default:
    name: myapp-network
